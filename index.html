<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="styles.css" />
	<title>Character Generator</title>
</head>

<body>
	<h1>⚔ Character Generator</h1>
	<p class="subtitle">Forge your legend</p>

	<button id="btnCreate">✦ Create Character</button>

	<!-- Result card -->
	<div id="characterCard">
		<div class="card-art" id="cardArt"></div>
		<div class="card-name" id="cardName"></div>
		<div class="card-class" id="cardClass"></div>
		<div class="card-stats">
			<div class="card-stat">
				<span class="card-stat-icon">⚔️</span>
				<span class="card-stat-val" id="cardStr"></span>
				<span class="card-stat-lbl">Strength</span>
			</div>
			<div class="card-stat">
				<span class="card-stat-icon">❤️</span>
				<span class="card-stat-val" id="cardLife"></span>
				<span class="card-stat-lbl">Life</span>
			</div>
		</div>
	</div>

	<!-- Modal overlay -->
	<div class="overlay" id="overlay">
		<dialog aria-modal="true" aria-label="Character customization">
			<!-- Live preview -->
			<aside class="preview-panel">
				<span class="preview-label">Live preview</span>
				<div class="character-display" id="previewArt"></div>
				<div class="preview-name" id="previewName">Hero</div>
				<div class="preview-class-badge" id="previewClass">Warrior</div>
				<div class="preview-stats">
					<div class="stat-pill">
						<span>⚔️</span><span id="previewStr">50</span>
					</div>
					<div class="stat-pill">
						<span>❤️</span><span id="previewLife">100</span>
					</div>
				</div>
			</aside>

			<!-- Form -->
			<div class="form-panel">
				<div class="form-header">
					<h2>Customize Character</h2>
					<button class="btn-close" id="btnClose" aria-label="Close">
						✕
					</button>
				</div>

				<form id="charForm" novalidate>
					<!-- Name -->
					<div class="form-group">
						<label for="inputName">🏷️ Name</label>
						<input type="text" id="inputName" placeholder="Enter your hero's name…" maxlength="30"
							autocomplete="off" />
					</div>

					<!-- Class -->
					<div class="form-group">
						<label>🎭 Class</label>
						<div class="class-grid">
							<input type="radio" name="cls" id="cls-warrior" value="warrior" class="class-option"
								checked />
							<label class="class-label" for="cls-warrior"><span
									class="class-icon">🛡️</span>Warrior</label>

							<input type="radio" name="cls" id="cls-mage" value="mage" class="class-option" />
							<label class="class-label" for="cls-mage"><span class="class-icon">🔮</span>Mage</label>

							<input type="radio" name="cls" id="cls-rog" value="rog" class="class-option" />
							<label class="class-label" for="cls-rog"><span class="class-icon">🗡️</span>Rog</label>

							<input type="radio" name="cls" id="cls-robber" value="robber" class="class-option" />
							<label class="class-label" for="cls-robber"><span class="class-icon">💰</span>Robber</label>

							<input type="radio" name="cls" id="cls-child" value="child" class="class-option" />
							<label class="class-label" for="cls-child"><span class="class-icon">⭐</span>Child</label>
						</div>
					</div>

					<!-- Strength -->
					<div class="form-group">
						<label for="inputStr">⚔️ Strength</label>
						<div class="range-row">
							<input type="range" class="str-range" id="inputStr" min="1" max="100" value="50" />
							<span class="range-val" id="strVal">50</span>
						</div>
					</div>

					<!-- Life -->
					<div class="form-group">
						<label for="inputLife">❤️ Life Points</label>
						<div class="range-row">
							<input type="range" class="life-range" id="inputLife" min="1" max="200" value="100" />
							<span class="range-val" id="lifeVal">100</span>
						</div>
					</div>

					<div class="form-actions">
						<button type="button" class="btn-cancel" id="btnCancel">
							Cancel
						</button>
						<button type="submit" class="btn-confirm">
							✦ Forge Character
						</button>
					</div>
				</form>
			</div>
		</dialog>
	</div>
	<script src="app.js"></script>
</body>

</html>
